<!DOCTYPE html>
<html>
<head>
<title>Banking System</title>
<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    text-align: center;
}

.container {
    background: white;
    padding: 30px;
    margin: 50px auto;
    width: 300px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
}

input {
    width: 90%;
    padding: 10px;
    margin: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 20px;
    background: #4facfe;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #007bff;
}
</style>
</head>

<body>

<div class="container">
<h2>Create Account</h2>
<form action="/create" method="post">
  <input name="acc_no" placeholder="Account Number" required><br>
  <input name="name" placeholder="Name" required><br>
  <input name="pin" placeholder="PIN" required><br>
  <button>Create</button>
</form>

<hr>

<h2>Login</h2>
<form action="/login" method="post">
  <input name="acc_no" placeholder="Account Number" required><br>
  <input name="pin" placeholder="PIN" required><br>
  <button>Login</button>
</form>
</div>

</body>
</html>
